name: Build APK with Buildozer

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      # 配置 Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # 配置 Python 3.10
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # 系统依赖
      - name: Install system packages
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y build-essential git unzip zip wget curl

      # Python 依赖 + Buildozer
      - name: Install Python & Buildozer
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer

      # 缓存 Buildozer/Android SDK（大幅减少重复下载）
      - name: Cache Buildozer assets
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
          key: ${{ runner.os }}-buildozer-v1-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            ${{ runner.os }}-buildozer-

      # 手动部署 Android SDK Commandline Tools + Build Tools（解决 aidl 缺失）
      - name: Deploy Android SDK
        run: |
          export SDK_ROOT="$HOME/.buildozer/android/platform/android-sdk"
          mkdir -p "$SDK_ROOT"
          cd "$SDK_ROOT"

          # 下载命令行工具
          wget -q https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q commandlinetools-linux-9477386_latest.zip

          # 修复目录结构（标准 Android cmdline-tools 布局）
          mkdir -p cmdline-tools/latest
          shopt -s dotglob
          mv cmdline-tools/* cmdline-tools/latest/ || true
          shopt -u dotglob

          # 写入全局环境变量，后续步骤生效
          echo "ANDROID_SDK_ROOT=$SDK_ROOT" >> $GITHUB_ENV
          echo "$SDK_ROOT/cmdline-tools/latest/bin" >> $GITHUB_PATH

          # 同意协议 + 安装编译工具链
          yes | sdkmanager --licenses
          sdkmanager --update
          sdkmanager "platforms;android-33" "build-tools;33.0.2" "platform-tools"

      # 生成/更新 buildozer.spec 并构建 APK
      - name: Build Android APK
        run: |
          # 不存在则初始化配置文件
          if [ ! -f buildozer.spec ]; then
            buildozer init
            # 批量修改核心配置
            sed -i 's/^title =.*/title = MyApp/' buildozer.spec
            sed -i 's/^package.name =.*/package.name = myapp/' buildozer.spec
            sed -i 's/^package.domain =.*/package.domain = org.example/' buildozer.spec
            sed -i 's/^android.api =.*/android.api = 33/' buildozer.spec
            sed -i 's/^android.ndk =.*/android.ndk = 25b/' buildozer.spec
          fi
          # 开始编译
          buildozer android debug

      # 上传编译产物
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: Android-APK
          path: bin/*.apk
