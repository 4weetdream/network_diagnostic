name: Build APK with Buildozer

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y build-essential git unzip zip wget

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer

      # 手动安装 Android SDK 和 Build Tools，解决 aidl 找不到的问题
      - name: Install Android SDK Build Tools
        run: |
          # 设置 Buildozer 工作目录
          export BUILDOZER_DIR=$HOME/.buildozer
          export ANDROID_SDK_ROOT=$BUILDOZER_DIR/android/platform/android-sdk
          mkdir -p $ANDROID_SDK_ROOT

          # 下载 Android SDK Command Line Tools
          wget https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip -O cmdline-tools.zip
          unzip -q cmdline-tools.zip -d $ANDROID_SDK_ROOT
          mv $ANDROID_SDK_ROOT/cmdline-tools $ANDROID_SDK_ROOT/cmdline-tools/latest
          export PATH=$ANDROID_SDK_ROOT/cmdline-tools/latest/bin:$PATH

          # 接受许可证并安装 Build Tools（版本需与 buildozer.spec 中的 android.api 匹配）
          yes | sdkmanager --licenses
          sdkmanager "build-tools;33.0.2" "platform-tools" "platforms;android-33"

      - name: Build APK with Buildozer
        run: |
          # 如果文件不存在，自动生成 buildozer.spec
          if [ ! -f buildozer.spec ]; then
            buildozer init
            # 自动修改关键配置
            sed -i 's/^title = .*/title = MyApp/' buildozer.spec
            sed -i 's/^package.name = .*/package.name = myapp/' buildozer.spec
            sed -i 's/^package.domain = .*/package.domain = org.example/' buildozer.spec
            # 设置与上面安装的 Build Tools 匹配的 API 版本
            sed -i 's/^android.api = .*/android.api = 33/' buildozer.spec
            sed -i 's/^android.ndk = .*/android.ndk = 25b/' buildozer.spec
          fi
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk
