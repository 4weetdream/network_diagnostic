name: Build APK
  on: [push, workflow_dispatch]

  jobs:
    build:
      runs-on: ubuntu-latest
      timeout-minutes: 90
      steps:
        - uses: actions/checkout@v4

        - name: Set up JDK 17
          uses: actions/setup-java@v4
          with:
            distribution: temurin
            java-version: "17"

        - name: Set up Python
          uses: actions/setup-python@v5
          with:
            python-version: "3.10"

        - name: Install deps
          run: |
            sudo apt-get update -qq
            sudo apt-get install -qq -y build-essential git libssl-dev libffi-dev python3-setuptools unzip zip
            pip install --upgrade pip "Cython<3.0" buildozer

        - name: Build APK
          run: buildozer android debug

        - name: Upload APK
          uses: actions/upload-artifact@v4
          with:
            name: NetworkDiagnostic-APK
            path: bin/*.apk
            retention-days: 30
