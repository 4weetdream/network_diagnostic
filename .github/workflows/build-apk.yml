name: Build APK with Buildozer

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install system tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -qq -y build-essential git unzip zip

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install buildozer

      - name: Build APK with Buildozer
        run: |
          # 如果文件不存在，自动生成 buildozer.spec
          if [ ! -f buildozer.spec ]; then
            buildozer init
            # 自动修改关键配置
            sed -i 's/^title = .*/title = MyApp/' buildozer.spec
            sed -i 's/^package.name = .*/package.name = myapp/' buildozer.spec
            sed -i 's/^package.domain = .*/package.domain = org.example/' buildozer.spec
            # 可选：根据你的项目修改更多配置
            # sed -i 's/^requirements = .*/requirements = python3, kivy/' buildozer.spec
          fi
          buildozer android debug

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: APK
          path: bin/*.apk
